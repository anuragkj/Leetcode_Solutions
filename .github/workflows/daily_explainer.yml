name: Daily LeetCode Explainer

on:
  workflow_dispatch:        # lets you run it on demand from the Actions tab
    inputs:
      force:
        description: "Regenerate even if today's note already exists"
        type: boolean
        default: false
  schedule:
    # 00:30 UTC = 06:00 AM IST, just after LeetCode's daily problem resets.
    - cron: "30 0 * * *"

# Allow the workflow to push the generated note back to the repo.
permissions:
  contents: write

# If a run is already in progress, don't pile up duplicates.
concurrency:
  group: daily-leetcode-explainer
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Surfaced to the `if:` on the email step so it's skipped when mail isn't configured.
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate today's study note
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Optional override, e.g. set a repo variable GEMINI_MODEL=gemini-2.0-flash
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          FORCE: ${{ inputs.force && '1' || '' }}
        run: python scripts/daily_leetcode.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Daily
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "[Daily] LeetCode study note — $DATE"
            git push
          fi

      # ---- Optional email reminder -------------------------------------------
      # Runs only when a NEW note was generated AND you've added the MAIL_* secrets.
      # Needs secrets: MAIL_USERNAME (your Gmail), MAIL_PASSWORD (a Gmail *App
      # Password*, not your login), and optionally MAIL_TO (defaults to yourself).
      - name: Email the daily note
        if: steps.gen.outputs.status == 'generated' && env.MAIL_USERNAME != ''
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: LeetCode Daily <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_TO || secrets.MAIL_USERNAME }}
          subject: "📅 LeetCode Daily — [${{ steps.gen.outputs.id }}] ${{ steps.gen.outputs.title }} (${{ steps.gen.outputs.difficulty }})"
          html_body: |
            <h2>Today's LeetCode: [${{ steps.gen.outputs.id }}] ${{ steps.gen.outputs.title }}</h2>
            <p><b>Difficulty:</b> ${{ steps.gen.outputs.difficulty }} &nbsp;·&nbsp; <b>Date:</b> ${{ steps.gen.outputs.date }}</p>
            <p>
              📖 <a href="${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}/Daily/${{ steps.gen.outputs.note_file }}">Read the full study note (with solution &amp; dry run)</a><br>
              🔗 <a href="${{ steps.gen.outputs.link }}">Open the problem on LeetCode</a>
            </p>
            <p>Read on the bus, then paste the solution yourself. 🚌</p>
